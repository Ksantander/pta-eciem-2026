<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard PTA ECIEM 2026</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F4F0;--sf:#FFF;--bd:#E2E0DA;--bdl:#EDECE8;--tx:#1A1917;--tx2:#6B6861;--tx3:#9E9B94;--bl:#1A4FBA;--blbg:#EBF0FA;--gn:#0D6E4A;--gnbg:#E5F5EE;--pu:#4A3BA8;--pubg:#EEECF8;--am:#A05F00;--ambg:#FDF3E3;--rd:#C13030;--rdbg:#FCEAEA;--or:#B05000;--orbg:#FEF0E5;}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:13px;min-height:100vh}
.hdr{background:var(--tx);color:#fff;padding:16px 28px;display:flex;align-items:center;justify-content:space-between}
.hdr-t{font-size:15px;font-weight:600;letter-spacing:-.01em}.hdr-s{font-size:11px;color:#9E9B94;margin-top:2px;font-family:'IBM Plex Mono',monospace}
.hbg{font-family:'IBM Plex Mono',monospace;font-size:10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);padding:4px 10px;border-radius:4px;color:rgba(255,255,255,.7)}
.main{max-width:980px;margin:0 auto;padding:24px 20px}
.tabs{display:flex;border-bottom:2px solid var(--bd);margin-bottom:24px;overflow-x:auto}
.tb{padding:9px 16px;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;font-size:12px;font-weight:500;color:var(--tx2);font-family:'IBM Plex Sans',sans-serif;white-space:nowrap}
.tb.active{color:var(--tx);border-bottom-color:var(--tx)}.tb:hover:not(.active){color:var(--tx);background:var(--bdl)}
.tc{font-family:'IBM Plex Mono',monospace;font-size:10px;opacity:.6;margin-left:3px}
.panel{display:none}.panel.active{display:block}
.sbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:12px 16px}
.sn{font-size:22px;font-weight:600;font-family:'IBM Plex Mono',monospace;line-height:1}.sl{font-size:10px;color:var(--tx2);margin-top:4px;text-transform:uppercase;letter-spacing:.06em}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:8px;margin-bottom:12px;overflow:hidden}
.ct{padding:14px 16px}
.ch{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;font-family:'IBM Plex Mono',monospace}
.an{font-weight:600;font-size:14px;letter-spacing:-.01em}.as2{font-size:11px;color:var(--tx2);margin-top:2px}
.bgs{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.bg{font-size:10px;padding:2px 7px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-weight:500}
.bg-r{background:var(--blbg);color:var(--bl)}.bg-o{background:var(--orbg);color:var(--or)}.bg-k{background:var(--gnbg);color:var(--gn)}.bg-w{background:var(--ambg);color:var(--am)}.bg-a{background:#E8F5E9;color:#1B5E20}
.ca{display:flex;gap:4px;margin-left:auto;flex-shrink:0}
.ib{background:none;border:1px solid var(--bd);border-radius:4px;cursor:pointer;padding:4px 8px;font-size:12px;color:var(--tx2)}
.ib:hover{background:var(--bg);color:var(--tx)}
.dg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.db{border:1px solid var(--bd);border-radius:6px;padding:10px 12px;cursor:pointer}
.db:hover{border-color:var(--tx2)}.db.ad{border-color:var(--tx)}
.dlbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:6px;font-weight:500}
.dpct{font-size:20px;font-weight:600;font-family:'IBM Plex Mono',monospace;line-height:1}
.dnm{font-size:10px;margin-top:3px}
.dbarw{height:3px;background:var(--bdl);border-radius:2px;margin-top:8px;overflow:hidden}
.dbarf{height:3px;border-radius:2px}
.det{display:none;border-top:1px solid var(--bdl);background:var(--bg);padding:14px 16px}
.det.open{display:block}
.deth{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.detd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dett{font-size:12px;line-height:1.7}
.opan{border-top:1px solid var(--bdl);padding:10px 16px;background:#FFFBF0}
.olbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--am);margin-bottom:4px}
.otxt{font-size:12px;color:#7A5000;line-height:1.6}
.hint{font-size:10px;color:var(--tx3);margin-bottom:8px;font-style:italic}
.twarn{font-size:11px;color:var(--rd);padding:6px 16px;background:var(--rdbg);border-top:1px solid #f5c6c6}
.addbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;background:none;border:1px dashed var(--bd);border-radius:8px;cursor:pointer;color:var(--tx2);font-size:12px;font-family:'IBM Plex Sans',sans-serif;margin-top:4px}
.addbtn:hover{background:var(--sf);border-color:var(--tx2);color:var(--tx)}
/* Resumen */
.rg2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.rc{background:var(--sf);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.rch{padding:12px 16px;border-bottom:1px solid var(--bdl);font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px}
.rcb{padding:14px 16px}
table.rt{width:100%;border-collapse:collapse;font-size:12px}
table.rt th{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--tx2);font-weight:500;padding:0 8px 8px 0;border-bottom:1px solid var(--bdl);text-align:left}
table.rt td{padding:7px 8px 7px 0;border-bottom:1px solid var(--bdl);vertical-align:top;line-height:1.4}
table.rt tr:last-child td{border-bottom:none}
.chip{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;margin:1px}
.cw{background:#EBF0FA;color:#1A4FBA}.cs{background:#EEECF8;color:#4A3BA8}
.c1{background:#E5F5EE;color:#0D6E4A}.c2{background:#FDF3E3;color:#A05F00}
.c3{background:#FCEAEA;color:#C13030}.c4{background:#F5F4F0;color:#6B6861}
.javg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.ja{background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:12px 14px}
.jat{font-size:11px;font-weight:600;margin-bottom:10px}
.jad{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.jal{font-size:11px;color:var(--tx2)}.jav{font-size:12px;font-weight:600;font-family:'IBM Plex Mono',monospace}
.jabw{height:3px;background:var(--bdl);border-radius:2px;margin-top:2px;overflow:hidden;margin-bottom:6px}
.jabf{height:3px;border-radius:2px}
.rful{background:var(--sf);border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:20px}
/* Modal */
.mo{display:none;position:fixed;inset:0;background:rgba(26,25,23,.5);z-index:200;align-items:center;justify-content:center}
.mo.open{display:flex}
.md{background:var(--sf);border-radius:10px;border:1px solid var(--bd);width:560px;max-width:95vw;max-height:90vh;overflow-y:auto}
.mdh{padding:18px 20px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.mdh h3{font-size:14px;font-weight:600}
.mdc{background:none;border:none;cursor:pointer;font-size:18px;color:var(--tx2);padding:0 4px}
.mdb{padding:20px}
.fr{margin-bottom:14px}
.fr label{font-size:11px;color:var(--tx2);display:block;margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.fr input,.fr textarea,.fr select{width:100%;font-size:13px;padding:8px 10px;border:1px solid var(--bd);border-radius:5px;background:var(--bg);color:var(--tx);font-family:'IBM Plex Sans',sans-serif}
.fr input:focus,.fr textarea:focus,.fr select:focus{outline:none;border-color:var(--tx)}
.dfg{display:grid;grid-template-columns:1fr 1fr;gap:10px}.dfg .fr{margin-bottom:0}
.th{font-size:12px;padding:7px 10px;border-radius:5px;margin-top:8px;display:none;font-family:'IBM Plex Mono',monospace}
.th.ok{background:var(--gnbg);color:var(--gn)}.th.bad{background:var(--rdbg);color:var(--rd)}
.mdf{padding:14px 20px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px}
.btnc{padding:8px 18px;background:none;border:1px solid var(--bd);border-radius:5px;cursor:pointer;font-size:13px;color:var(--tx2);font-family:'IBM Plex Sans',sans-serif}
.btns{padding:8px 18px;background:var(--tx);color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:13px;font-family:'IBM Plex Sans',sans-serif;font-weight:500}
.sdiv{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--bdl)}
</style>
</head>
<body>
<div class="hdr">
  <div><div class="hdr-t">Dashboard PTA — ECIEM 2026</div><div class="hdr-s">Escuela de Ciencias Empresariales · UCN Sede Coquimbo</div></div>
  <div class="hbg">17 académicos · 4 jerarquías</div>
</div>
<div class="main">
  <div class="tabs">
    <button class="tb active" onclick="sw('res')">📊 Resumen Escuela</button>
    <button class="tb" onclick="sw('sj')">Sin Jerarquía<span class="tc">(5)</span></button>
    <button class="tb" onclick="sw('as')">Asistente<span class="tc">(6)</span></button>
    <button class="tb" onclick="sw('ac')">Asociado<span class="tc">(5)</span></button>
    <button class="tb" onclick="sw('ti')">Titular<span class="tc">(1)</span></button>
  </div>
  <div id="p-res" class="panel active"></div>
  <div id="p-sj" class="panel"></div>
  <div id="p-as" class="panel"></div>
  <div id="p-ac" class="panel"></div>
  <div id="p-ti" class="panel"></div>
</div>
<div class="mo" id="mo">
<div class="md">
  <div class="mdh"><h3 id="mtit">Agregar</h3><button class="mdc" onclick="cm()">×</button></div>
  <div class="mdb">
    <div class="fr"><label>Nombre</label><input type="text" id="fn"></div>
    <div class="fr"><label>Planta / Cargo</label><input type="text" id="fc"></div>
    <div class="fr"><label>Estado PTA</label><select id="fe"><option value="r">En Revisión del Director</option><option value="o">Con Obs. del Director</option><option value="a">Aprobado</option></select></div>
    <div class="sdiv">% por dimensión</div>
    <div class="dfg" style="margin-bottom:8px">
      <div class="fr"><label>Docencia %</label><input type="number" id="fd" min="0" max="100" step="1" placeholder="0"></div>
      <div class="fr"><label>Investigación %</label><input type="number" id="fi" min="0" max="100" step="1" placeholder="0"></div>
      <div class="fr"><label>Vinculación %</label><input type="number" id="fv" min="0" max="100" step="1" placeholder="0"></div>
      <div class="fr"><label>Gestión %</label><input type="number" id="fg" min="0" max="100" step="1" placeholder="0"></div>
    </div>
    <div class="th" id="th"></div>
    <div class="sdiv">Compromisos</div>
    <div class="fr"><label>Docencia</label><textarea id="fdd" rows="2"></textarea></div>
    <div class="fr"><label>Investigación</label><textarea id="fid" rows="2"></textarea></div>
    <div class="fr"><label>Vinculación</label><textarea id="fvd" rows="2"></textarea></div>
    <div class="fr"><label>Gestión</label><textarea id="fgd" rows="2"></textarea></div>
    <div class="fr"><label>Observaciones de la Directora</label><textarea id="fod" rows="3"></textarea></div>
    <div class="fr"><label>Otras observaciones</label><textarea id="fo" rows="2"></textarea></div>
  </div>
  <div class="mdf"><button class="btnc" onclick="cm()">Cancelar</button><button class="btns" onclick="sa()">Guardar</button></div>
</div>
</div>

function ini(n){return n.split(' ').filter(w=>w).slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function avc(n){let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))&0xffff;return AV[h%AV.length];}

function td(id,k){
  DM.forEach(d=>{const e=document.getElementById('dt_'+id+'_'+d.k);const b=document.getElementById('db_'+id+'_'+d.k);if(e)e.classList.remove('open');if(b)b.classList.remove('ad');});
  const el=document.getElementById('dt_'+id+'_'+k),btn=document.getElementById('db_'+id+'_'+k);
  if(el&&!el.classList.contains('open')){el.classList.add('open');if(btn)btn.classList.add('ad');}
}

function eb(e){
  if(e==='a')return '<span class="bg bg-a">PTA Aprobado</span>';

  return '<span class="bg bg-r">PTA en Revisión Director</span>';
}

function rp(j){
  const p=document.getElementById('p-'+j),l=D[j];

  const ceo=l.filter(a=>a.e==='o').length;
  let h=`<div class="sbar">
    <div class="sc"><div class="sn">${l.length}</div><div class="sl">Académicos</div></div>

  l.forEach((a,idx)=>{
    const id=j+'_'+idx,av=avc(a.n);
    const hod=a.od&&a.od.trim()&&a.od!=='Sin observaciones.'&&a.od!=='PTA Aprobado.';
    const ho=a.o&&a.o.trim();

    h+=`<div class="card"><div class="ct">

        <div class="av" style="background:${av.bg};color:${av.co}">${ini(a.n)}</div>

      </div>
      <div class="hint">Clic en dimensión para ver compromisos detallados</div>
      <div class="dg">`;
    DM.forEach(d=>{
      const val=parseFloat(a[d.k])||0;
      h+=`<div class="db" id="db_${id}_${d.k}" onclick="td('${id}','${d.k}')">
        <div class="dlbl">${d.l}</div><div class="dpct" style="color:${d.c}">${val>0?val+'%':'—'}</div>

        <div class="dbarw"><div class="dbarf" style="width:${Math.min(val,100)}%;background:${d.c}"></div></div>
      </div>`;
    });
    h+=`</div>`;
    if(Math.round(tot)!==100&&tot>0)h+=`<div class="twarn">⚠ Total: ${Math.round(tot)}% — debe sumar 100%</div>`;
    h+=`</div>`;
    DM.forEach(d=>{
      h+=`<div class="det" id="dt_${id}_${d.k}">
        <div class="deth" style="color:${d.c}"><div class="detd" style="background:${d.c}"></div>${d.l} — Compromisos</div>
        <div class="dett">${a[d.k+'d']||'<em style="color:#9E9B94">Sin detalle.</em>'}</div>
      </div>`;
    });
    if(hod)h+=`<div class="opan"><div class="olbl">📋 Observaciones de la Directora</div><div class="otxt">${a.od}</div></div>`;
    if(ho)h+=`<div class="opan" style="background:#FFF8F0"><div class="olbl" style="color:var(--or)">⚠ Otras observaciones</div><div class="otxt" style="color:#7A4000">${a.o}</div></div>`;
    h+=`</div>`;
  });
  h+=`<button class="addbtn" onclick="oa('${j}')">+ Agregar académico a ${LB[j]}</button>`;
  p.innerHTML=h;
}

function sw(j){
  const all=['res',...JL];
  all.forEach(k=>document.getElementById('p-'+k).classList.remove('active'));
  document.querySelectorAll('.tb').forEach((b,i)=>b.classList.toggle('active',all[i]===j));
  document.getElementById('p-'+j).classList.add('active');
  if(j==='res')renderRes();else rp(j);
}
function oa(j){ej=j;ei=null;document.getElementById('mtit').textContent='Agregar — '+LB[j];['fn','fc','fd','fi','fv','fg','fdd','fid','fvd','fgd','fod','fo'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});document.getElementById('fe').value='r';document.getElementById('th').style.display='none';document.getElementById('mo').classList.add('open');}
function oe(j,idx){ej=j;ei=idx;const a=D[j][idx];document.getElementById('mtit').textContent='Editar — '+a.n;['fn','fc'].forEach(id=>document.getElementById('f'+id.slice(1)).value=a[id.slice(1)]||'');document.getElementById('fn').value=a.n||'';document.getElementById('fc').value=a.c||'';document.getElementById('fd').value=a.d||'';document.getElementById('fi').value=a.i||'';document.getElementById('fv').value=a.v||'';document.getElementById('fg').value=a.g||'';document.getElementById('fdd').value=a.dd||'';document.getElementById('fid').value=a.id||'';document.getElementById('fvd').value=a.vd||'';document.getElementById('fgd').value=a.gd||'';document.getElementById('fod').value=a.od||'';document.getElementById('fo').value=a.o||'';document.getElementById('fe').value=a.e||'r';uh();document.getElementById('mo').classList.add('open');}
function uh(){const tot=['fd','fi','fv','fg'].reduce((s,id)=>s+(parseFloat(document.getElementById(id).value)||0),0);const th=document.getElementById('th');if(tot>0){th.style.display='block';const ok=Math.round(tot)===100;th.className='th '+(ok?'ok':'bad');th.textContent='Total: '+Math.round(tot)+'%'+(ok?' ✓':' — debe sumar 100%');}else th.style.display='none';}
['fd','fi','fv','fg'].forEach(id=>document.getElementById(id).addEventListener('input',uh));
function cm(){document.getElementById('mo').classList.remove('open');}
function sa(){const n=document.getElementById('fn').value.trim();if(!n){alert('Ingresa el nombre.');return;}const a={n,c:document.getElementById('fc').value.trim(),e:document.getElementById('fe').value,d:parseFloat(document.getElementById('fd').value)||0,i:parseFloat(document.getElementById('fi').value)||0,v:parseFloat(document.getElementById('fv').value)||0,g:parseFloat(document.getElementById('fg').value)||0,dd:document.getElementById('fdd').value.trim(),id:document.getElementById('fid').value.trim(),vd:document.getElementById('fvd').value.trim(),gd:document.getElementById('fgd').value.trim(),od:document.getElementById('fod').value.trim(),o:document.getElementById('fo').value.trim()};if(ei!==null)D[ej][ei]=a;else D[ej].push(a);cm();rp(ej);}
function da(j,idx){if(!confirm('Eliminar a '+D[j][idx].n+'?'))return;D[j].splice(idx,1);rp(j);}
document.getElementById('mo').addEventListener('click',function(e){if(e.target===this)cm();});
renderRes();
</script>
